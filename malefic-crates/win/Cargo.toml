[package]
name = "malefic-os-win"
version = "0.1.0"
edition = "2021"

[features]
default = []
source = []
prebuild = []
regenerate_binding = ["prebuild"]
community = []
detour = ["dep:detour"]
bypass = ["detour"]
token = ["pipe"]
reg = []
pipe = []
scheduler = []
service = []
clr = []
sleep_obf = []
wmi = ["dep:thiserror", "dep:windows-core"]

[dependencies]
anyhow = { workspace = true }
malefic-gateway = { workspace = true }
strum = { workspace = true }
strum_macros = { workspace = true }
malefic-common = { workspace = true }
malefic-process = { workspace = true }
thiserror = { workspace = true, optional = true }
windows-core = { workspace = true, optional = true }
windows = { workspace = true, features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_Security_Authentication_Identity",
    "Win32_System_Threading",
    "Win32_System_Memory",
    "Win32_System_LibraryLoader",
    "Win32_System_Diagnostics_Debug",
    "Win32_System_Diagnostics_ToolHelp",
    "Win32_System_Pipes",
    "Win32_System_Registry",
    "Win32_System_Services",
    "Win32_System_Com",
    "Win32_System_TaskScheduler",
    "Win32_Storage_FileSystem",
    "Win32_System_IO",
    "Win32_System_SystemServices",
    "Win32_System_Environment",
    "Win32_System_Wmi",
    "Win32_System_Ole",
    "Win32_System_Variant",
    "Win32_System_Rpc",
] }
detour = { git = "https://github.com/chainreactors/retour-rs", branch = "fix-nightly1.67.0-changes", optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "time", "sync"] }
windows = { workspace = true, features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_Threading",
    "Win32_System_Wmi",
] }

[build-dependencies]
bindgen = { workspace = true }
syn = { workspace = true, features = ["parsing"] }
quote = { workspace = true }
