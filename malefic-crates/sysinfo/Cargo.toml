[package]
name = "malefic-sysinfo"
version = "0.1.0"
edition = "2021"

[features]
default = []
clr = ["malefic-os-win/clr"]

[dependencies]
anyhow = { workspace = true }
obfstr = { workspace = true }
sha2 = { workspace = true }
malefic-process = { workspace = true }

[target.'cfg(target_os = "windows")'.dependencies]
malefic-os-win = { workspace = true }
windows = { workspace = true, features = [
    "Win32_Foundation",
    "Win32_System_SystemInformation",
    "Win32_System_Registry",
    "Win32_System_Threading",
    "Win32_Security",
    "Win32_NetworkManagement_IpHelper",
    "Win32_NetworkManagement_Ndis",
    "Win32_Networking_WinSock",
    "Win32_Networking_ActiveDirectory",
    "Win32_NetworkManagement_NetManagement",
    "Win32_System_Environment",
    "Win32_Storage_FileSystem",
    "Win32_System_WindowsProgramming",
] }

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }
nix = { workspace = true }
mac_address = "1.1"
malefic-common = { workspace = true }
malefic-net = { workspace = true }
